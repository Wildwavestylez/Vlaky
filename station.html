<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Train Ops - IDEAL ARCH v2</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  font-family: Arial;
}

/* MAPA */
#map {
  height: calc(100vh - 45vh);
}

/* UI DRAWER (scrollovatelný jezdec) */
#ui {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 45vh;
  background: #111;
  color: white;
  overflow-y: auto;
  border-top-left-radius: 16px;
  border-top-right-radius: 16px;
}

/* HEADER */
#top {
  padding: 8px;
  background: #1c1c1c;
  font-size: 13px;
}

/* LAYOUT */
#content {
  display: flex;
}

/* QUEUE */
#queue {
  width: 40%;
  background: #151515;
  overflow-y: auto;
}

.train {
  padding: 8px;
  margin: 6px;
  background: #222;
  border-radius: 8px;
  cursor: pointer;
  position: relative;
}

.dot {
  width: 8px;
  height: 8px;
  background: limegreen;
  border-radius: 50%;
  position: absolute;
  right: 8px;
  top: 8px;
}

/* DETAIL */
#detail {
  flex: 1;
  padding: 10px;
}

img {
  width: 100%;
  border-radius: 10px;
}

/* BUTTONY */
button {
  margin: 4px;
  padding: 8px;
  border: none;
  border-radius: 8px;
  font-weight: bold;
}

.g { background: #4caf50; }
.b { background: #2196f3; }
.r { background: #f44336; }
.y { background: #ff9800; }

/* PROGRESS */
.bar {
  height: 8px;
  background: #333;
  border-radius: 5px;
  overflow: hidden;
  margin: 5px 0;
}

.fill {
  height: 100%;
  width: 0%;
  background: limegreen;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="ui">

  <div id="top">
    💰 <span id="money">0</span> Kč | 🚉 Plzeň | Koleje: 2
  </div>

  <div id="content">

    <div id="queue"></div>

    <div id="detail">
      <h3 id="name">Vyber vlak</h3>
      <p id="state">---</p>
      <img id="img"/>

      <div class="bar"><div id="p1" class="fill"></div></div>
      <div class="bar"><div id="p2" class="fill"></div></div>
      <div class="bar"><div id="p3" class="fill"></div></div>

      <div id="actions"></div>
    </div>

  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// 🌍 MAPA
const map = L.map('map').setView([49.7384, 13.3736], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// 💰
let money = 0;
let selected = null;

// 🚉 KOLEJE
let tracks = [null, null];

// 🚂 VLAKY
let trains = [
{
  id: 1,
  name: "810 → Rokycany",
  image: "https://i.imgur.com/SSg8BRL.jpg",
  state: "WAIT_ASSIGN",
  track: null,
  progress: { exit:0, clean:0, board:0 },
  timers: { exit:20, clean:120, board:20 },
  train.pendingAction = false;
  
},
{
  id: 2,
  name: "810 → Přeštice",
  image: "https://i.imgur.com/SSg8BRL.jpg",
  state: "WAIT_ASSIGN",
  track: null,
  progress: { exit:0, clean:0, board:0 },
  timers: { exit:20, clean:120, board:20 },
  train.pendingAction = false;
},
{
  id: 3,
  name: "Rychlík Praha",
  image: "https://i.imgur.com/SSg8BRL.jpg",
  state: "COMING",
  track: null,
  progress: {},
  timers: {},
  travel: 45,
  travelMax: 45,
  train.pendingAction = false;
}
];

// 🚉 ASSIGN TRACK
function assign(train){
  for(let i=0;i<tracks.length;i++){
    if(!tracks[i]){
      tracks[i] = train.id;
      train.track = i+1;
      train.state = "ARRIVED";
      train.dot = true;
      return;
    }
  }
}

// 📋 QUEUE
function render(){

  let q = document.getElementById("queue");
  q.innerHTML = "";

  trains.forEach(t => {

    let d = document.createElement("div");
    d.className = "train";

    // 👉 správná logika zelené tečky
    let isSelected = selected && selected.id === t.id;
    let showDot = hasDot(t, isSelected);

    d.innerHTML = `
      ${showDot ? '<div class="dot"></div>' : ''}
      <b>${t.name}</b><br>
      <small>${t.state}</small>
    `;

    d.onclick = () => select(t);

    q.appendChild(d);
  });

  updateDetail();
}

// 🎯 SELECT
function select(t){
  selected = t;
  updateDetail();
}

function hasDot(t, isSelected){
  return t.pendingAction && !isSelected;
}


function updateDetail(){

  if(!selected) return;

  document.getElementById("name").innerText = selected.name;
  document.getElementById("state").innerText = selected.state;
  document.getElementById("img").src = selected.image;

  document.getElementById("p1").style.width = (selected.progress.exit || 0) + "%";
  document.getElementById("p2").style.width = (selected.progress.clean || 0) + "%";
  document.getElementById("p3").style.width = (selected.progress.board || 0) + "%";

  renderActions();
}

// ⚙️ ACTIONS
function renderActions(){
  let a = document.getElementById("actions");
  a.innerHTML = "";

  if(!selected) return;

  if(selected.state === "ARRIVED"){
    a.innerHTML += `<button class="g" onclick="start('exit')">VYLOŽIT</button>`;
  }

  if(selected.state === "WAIT_CLEAN"){
    a.innerHTML += `<button class="y" onclick="start('clean')">ÚKLID</button>`;
  }

  if(selected.state === "WAIT_BOARD"){
    a.innerHTML += `<button class="b" onclick="start('board')">NÁSTUP</button>`;
  }

  if(selected.state === "READY_DEPART"){
    a.innerHTML += `<button class="r" onclick="depart()">ODJEZD</button>`;
  }
}

// ▶️ START TIMER
function start(type){

  if(!selected) return;

  let train = selected;

  train.timer = train.timers[type];
  train.active = type;

  // 👉 úkol začal = tečka NESMÍ svítit
  train.pendingAction = false;

  let interval = setInterval(()=>{

    train.timer--;

    let total = train.timers[type];
    let p = ((total - train.timer)/total)*100;

    train.progress[type] = p;

    if(train.timer <= 0){
      clearInterval(interval);

      train.timer = 0;
      train.progress[type] = 100;

      // 🚂 KLÍČOVÝ MOMENT:
      // úkol je hotový → čeká na hráče → ZELENÁ TEČKA
      train.pendingAction = true;

      if(type==="exit"){
        train.state = "WAIT_CLEAN";
      }

      if(type==="clean"){
        train.state = "WAIT_BOARD";
      }

      if(type==="board"){
        train.state = "READY_DEPART";
      }

      render();
    }

    if(selected?.id === train.id){
      updateDetail();
    }

  },1000);
}

// 🚂 DEPART
function depart(){
  if(selected.state!=="READY_DEPART") return;

  money += 100;
  document.getElementById("money").innerText = money;

  tracks[selected.track-1]=null;

  selected.state="DONE";
  selected.dot=false;

  selected=null;
  render();
}

// 🔁 LOOP
setInterval(()=>{

  // 1) vlak přidělen
  trains.forEach(t=>{
    if(t.state==="WAIT_ASSIGN"){
      assign(t);
    }
  });

  // 2) rychlík přijíždí
  let fast = trains.find(t=>t.name==="Rychlík Praha");

  if(fast.state==="COMING"){
    fast.travel--;
    if(fast.travel<=0){
      fast.state="WAIT_ASSIGN";
    }
  }

  render();

},1000);

render();

</script>
</body>
</html>
