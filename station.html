<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Train Ops - Clean FSM v1</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  font-family: Arial;
}

/* MAP */
#map {
  height: calc(100vh - 55vh);
}

/* UI */
#ui {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 55vh;
  background: #111;
  color: white;
  display: flex;
  flex-direction: column;
}

/* TOP */
#topbar {
  padding: 6px;
  background: #1c1c1c;
  font-size: 13px;
}

/* LAYOUT */
#content {
  display: flex;
  flex: 1;
  overflow: hidden;
}

#queue {
  width: 40%;
  background: #151515;
  overflow-y: auto;
}

.item {
  padding: 10px;
  margin: 6px;
  background: #222;
  border-radius: 8px;
  cursor: pointer;
}

#detail {
  flex: 1;
  padding: 10px;
}

button {
  margin: 4px;
  padding: 8px;
  border: none;
  border-radius: 6px;
  font-weight: bold;
  cursor: pointer;
}

.g { background:#4caf50; }
.b { background:#2196f3; }
.r { background:#f44336; }
.o { background:#ff9800; }

img {
  width: 100%;
  border-radius: 10px;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="ui">

  <div id="topbar">
    💰 <span id="money">0</span> Kč | 🚉 Plzeň
  </div>

  <div id="content">

    <div id="queue"></div>

    <div id="detail">
      <h3 id="name">Vyber vlak</h3>
      <p id="state">---</p>
      <p id="track">---</p>

      <img id="img" />

      <div id="info">
        ⏱ <span id="timer">0</span>s
      </div>

      <button class="g" onclick="exit()">VYLOŽIT</button>
      <button class="o" onclick="clean()">ÚKLID</button>
      <button class="b" onclick="board()">NÁSTUP</button>
      <button class="r" onclick="depart()">ODJEZD</button>

    </div>

  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// 🌍 MAPA
const map = L.map('map').setView([49.7384, 13.3736], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// 💰
let money = 0;
let selected = null;

// 🚂 VLAKY
let trains = [
  createTrain(1, "810 → Rokycany"),
  createTrain(2, "810 → Přeštice")
];

function createTrain(id, name){
  return {
    id,
    name,
    image: "https://i.imgur.com/SSg8BRL.jpg",

    state: "ARRIVED",
    track: 1,

    activeTimer: null,
    timer: 0,

    workflow: {
      exit: 20,
      clean: 180,
      board: 20
    }
  };
}

// 📋 QUEUE
function render(){
  const q = document.getElementById("queue");
  q.innerHTML = "";

  trains.forEach(t=>{
    let div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `<b>${t.name}</b><br>${t.state}`;
    div.onclick = ()=>select(t);
    q.appendChild(div);
  });
}

function select(t){
  selected = t;

  document.getElementById("name").innerText = t.name;
  document.getElementById("state").innerText = t.state;
  document.getElementById("track").innerText = "Kolej: " + t.track;
  document.getElementById("img").src = t.image;
}

// 🧠 TIMER ENGINE (CLEAN FSM)
function run(train, time, nextState){

  if(train.activeTimer) return;

  train.timer = time;

  train.activeTimer = setInterval(()=>{

    train.timer--;

    document.getElementById("timer").innerText = train.timer;

    if(train.timer <= 0){
      clearInterval(train.activeTimer);
      train.activeTimer = null;

      train.state = nextState;

    }

  },1000);
}

// 🚶 EXIT
function exit(){
  if(!selected) return;
  run(selected, selected.workflow.exit, "WAIT_CLEAN");
}

// 🧹 CLEAN
function clean(){
  if(!selected) return;
  if(selected.state !== "WAIT_CLEAN") return;

  run(selected, selected.workflow.clean, "WAIT_BOARD");
}

// 🚶 BOARD
function board(){
  if(!selected) return;
  if(selected.state !== "WAIT_BOARD") return;

  run(selected, selected.workflow.board, "READY_DEPARTURE");
}

// 🚂 DEPART
function depart(){
  if(!selected) return;
  if(selected.state !== "READY_DEPARTURE") return;

  money += 100;
  document.getElementById("money").innerText = money;

  selected.state = "DEPARTED";

  trains = trains.filter(t => t.id !== selected.id);

  selected = null;

  render();
}

// 🔁 LOOP
setInterval(()=>{
  render();
},1000);

render();

</script>

</body>
</html>
