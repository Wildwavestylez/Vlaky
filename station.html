<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Train Operations - Engine v1</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
}

/* MAPA */
#map {
  height: calc(100vh - 55vh);
}

/* DRAWER */
#ui {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;

  max-height: 55vh;
  background: #111;
  color: white;

  border-top-left-radius: 16px;
  border-top-right-radius: 16px;

  display: flex;
  flex-direction: column;

  overflow: hidden;
}

/* TOP BAR */
#topbar {
  padding: 6px;
  background: #1c1c1c;
  font-size: 13px;
}

/* LAYOUT */
#content {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* QUEUE */
#queue {
  width: 40%;
  background: #151515;
  overflow-y: auto;
}

.trainItem {
  padding: 8px;
  margin: 5px;
  background: #222;
  border-radius: 8px;
  cursor: pointer;
  font-size: 12px;
}

.trainItem img {
  width: 100%;
  border-radius: 6px;
  margin-top: 5px;
}

/* DETAIL */
#detail {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
}

#detail img {
  width: 100%;
  border-radius: 10px;
}

button {
  margin: 3px;
  padding: 8px;
  border: none;
  border-radius: 6px;
  font-weight: bold;
  cursor: pointer;
}

.green { background: #4caf50; }
.blue { background: #2196f3; }
.red { background: #f44336; }

.bar {
  height: 8px;
  background: #333;
  border-radius: 5px;
  overflow: hidden;
  margin: 5px 0;
}

.fill {
  height: 100%;
  width: 0%;
  background: limegreen;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="ui">

  <div id="topbar">
    💰 <span id="money">0</span> Kč | 🚉 Plzeň | Kolej: 1
  </div>

  <div id="content">

    <!-- QUEUE -->
    <div id="queue"></div>

    <!-- DETAIL -->
    <div id="detail">
      <h3 id="tName">Vyber vlak</h3>
      <img id="tImg" />
      <p id="tState">---</p>
      <p>State timer: <span id="tTimer">--</span></p>

      <div>
        🧍 Výstup
        <div class="bar"><div id="exitBar" class="fill"></div></div>

        🧹 Úklid
        <div class="bar"><div id="cleanBar" class="fill"></div></div>

        🚶 Nástup
        <div class="bar"><div id="boardBar" class="fill"></div></div>
      </div>

      <button class="green" onclick="startExit()">VYLOŽIT</button>
      <button class="blue" onclick="startBoard()">NÁSTUP</button>
      <button class="red" onclick="finishTrain()">ODJEZD</button>
    </div>

  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// 🌍 MAPA
const map = L.map('map').setView([49.7384, 13.3736], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// 💰 STATE
let money = 0;
let selected = null;

// 🚂 VLÁKNA
let trains = [
  {
    id: 1,
    name: "810 → Rokycany",
    image: "https://i.imgur.com/SSg8BRL.jpg",
    state: "APPROACHING",
    track: 1,
    timers: { exit: 20, clean: 180, board: 20 },
    progress: { exit: 0, clean: 0, board: 0 },
    activeTimer: null
  },
  {
    id: 2,
    name: "810 → Přeštice",
    image: "https://i.imgur.com/SSg8BRL.jpg",
    state: "APPROACHING",
    track: null,
    timers: { exit: 20, clean: 180, board: 20 },
    progress: { exit: 0, clean: 0, board: 0 },
    activeTimer: null
  }
];

// 📋 QUEUE
function renderQueue() {
  const q = document.getElementById("queue");
  q.innerHTML = "";

  trains.forEach(t => {
    const div = document.createElement("div");
    div.className = "trainItem";

    div.innerHTML = `
      <b>${t.name}</b><br>
      <small>${t.state}</small>
      <img src="${t.image}">
    `;

    div.onclick = () => selectTrain(t);
    q.appendChild(div);
  });
}

// 🎯 SELECT
function selectTrain(t) {
  selected = t;

  document.getElementById("tName").innerText = t.name;
  document.getElementById("tImg").src = t.image;
  document.getElementById("tState").innerText = t.state;

  updateBars();
}

// 📊 BARS
function updateBars() {
  if (!selected) return;

  document.getElementById("exitBar").style.width = selected.progress.exit + "%";
  document.getElementById("cleanBar").style.width = selected.progress.clean + "%";
  document.getElementById("boardBar").style.width = selected.progress.board + "%";
}

// ⏱ TIMER ENGINE
function runTimer(train, type, seconds, nextState) {
  if (train.activeTimer) return;

  train.state = type.toUpperCase();
  let elapsed = 0;

  train.activeTimer = setInterval(() => {
    elapsed++;
    let percent = (elapsed / seconds) * 100;
    train.progress[type] = percent;

    if (elapsed >= seconds) {
      clearInterval(train.activeTimer);
      train.activeTimer = null;
      train.progress[type] = 100;
      train.state = nextState;
    }

    if (selected && selected.id === train.id) updateBars();

  }, 1000);
}

// 🚶 VÝSTUP
function startExit() {
  if (!selected) return;
  runTimer(selected, "exit", selected.timers.exit, "EXIT_DONE");
}

// 🧹 ÚKLID
function startClean(train) {
  runTimer(train, "clean", train.timers.clean, "CLEAN_DONE");
}

// 🚶 NÁSTUP
function startBoard() {
  if (!selected) return;
  runTimer(selected, "board", selected.timers.board, "BOARD_DONE");
}

// 🚂 ODJEDZ
function finishTrain() {
  if (!selected) return;
  if (selected.state !== "BOARD_DONE") return;

  money += 100;
  document.getElementById("money").innerText = money;

  selected.state = "DEPARTED";
  selected = null;

  renderQueue();
}

// 🔁 LOOP
setInterval(() => {
  trains.forEach(t => {
    if (t.state === "APPROACHING" && !t.track) {
      t.track = 1;
    }

    if (t.state === "EXIT_DONE") {
      startClean(t);
    }

    if (t.state === "CLEAN_DONE") {
      startBoard(t);
    }
  });

  renderQueue();
}, 1000);

// START
renderQueue();

</script>

</body>
</html>
