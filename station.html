<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Train Operations - State Machine MVP</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body {
  margin: 0;
  font-family: Arial;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

#map {
  flex: 1;
}

/* UI */
#ui {
  height: 45vh;
  background: #111;
  color: white;
  display: flex;
  flex-direction: column;
  border-top-left-radius: 14px;
  border-top-right-radius: 14px;
  overflow: hidden;
}

/* STATS */
#stats {
  padding: 8px;
  background: #1c1c1c;
  font-size: 14px;
}

/* LAYOUT */
#content {
  display: flex;
  flex: 1;
}

/* QUEUE */
#queue {
  width: 40%;
  background: #151515;
  overflow-y: auto;
}

.queueItem {
  padding: 10px;
  margin: 6px;
  background: #222;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
}

.queueItem:hover {
  background: #333;
}

/* DETAIL */
#detail {
  flex: 1;
  padding: 10px;
}

button {
  margin: 4px;
  padding: 10px;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

.action {
  background: #2196f3;
}

.depart {
  background: #f44336;
}

.phaseBox {
  margin-top: 10px;
  padding: 8px;
  background: #1c1c1c;
  border-radius: 8px;
}

.timer {
  font-size: 18px;
  margin: 5px 0;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="ui">

  <div id="stats">
    💰 <span id="money">0</span> Kč | 🚉 Plzeň | Koleje: 2
  </div>

  <div id="content">

    <div id="queue"></div>

    <div id="detail">
      <h3 id="name">Vyber vlak</h3>
      <p id="state">---</p>
      <p>🚉 Track: <span id="track">-</span></p>

      <div class="phaseBox">
        ⏱️ Timer: <div class="timer" id="timer">--</div>
        📍 Phase: <span id="phase">---</span>
      </div>

      <img id="img" style="width:100%; border-radius:10px; margin-top:10px; display:none;" />

      <div id="actions"></div>

      <button class="depart" onclick="depart()">ODJEZD</button>
    </div>

  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// 🌍 MAPA
const map = L.map('map').setView([49.7384, 13.3736], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// 💰 STATE
let money = 0;
let selected = null;

// 🚉 KOLEJE
let tracks = [null, null];

// 🚂 VLAKY (STATE MACHINE)
let trains = [
{
  id: 1,
  name: "810 → Rokycany",
  image: "https://i.imgur.com/SSg8BRL.jpg",
  state: "APPROACHING",
  track: null,
  phase: null,
  timer: 0,
  phases: {
    DISEMBARKING: 20,
    CLEANING: 180,
    BOARDING: 20
  }
},
{
  id: 2,
  name: "810 → Přeštice",
  image: "https://i.imgur.com/SSg8BRL.jpg",
  state: "APPROACHING",
  track: null,
  phase: null,
  timer: 0,
  phases: {
    DISEMBARKING: 20,
    CLEANING: 180,
    BOARDING: 20
  }
}
];

// 🚉 ASSIGN TRACK
function assignTrack(train) {
  for (let i = 0; i < tracks.length; i++) {
    if (!tracks[i]) {
      tracks[i] = train.id;
      train.track = i + 1;
      train.state = "ARRIVED";
      return;
    }
  }
}

// 📋 QUEUE
function renderQueue() {
  const q = document.getElementById("queue");
  q.innerHTML = "";

  trains.forEach(t => {
    const div = document.createElement("div");
    div.className = "queueItem";
    div.innerHTML = `${t.name}<br><small>${t.state}</small>`;
    div.onclick = () => select(t);
    q.appendChild(div);
  });
}

// 🎯 SELECT
function select(t) {
  selected = t;

  document.getElementById("name").innerText = t.name;
  document.getElementById("state").innerText = t.state;
  document.getElementById("track").innerText = t.track ?? "-";

  document.getElementById("img").src = t.image;
  document.getElementById("img").style.display = "block";

  renderActions();
}

// ⚙️ ACTION BUTTONS
function renderActions() {
  const a = document.getElementById("actions");
  a.innerHTML = "";

  if (!selected) return;

  if (selected.state === "ARRIVED") {
    a.innerHTML += `<button class="action" onclick="start('DISEMBARKING')">VYLOŽIT CESTUJÍCÍ</button>`;
  }

  if (selected.state === "READY_CLEANING") {
    a.innerHTML += `<button class="action" onclick="start('CLEANING')">ÚKLID</button>`;
  }

  if (selected.state === "READY_BOARDING") {
    a.innerHTML += `<button class="action" onclick="start('BOARDING')">NÁSTUP</button>`;
  }
}

// ▶️ START PHASE
function start(phase) {
  if (!selected) return;

  selected.phase = phase;
  selected.timer = selected.phases[phase];
}

// 🚂 DEPART
function depart() {
  if (!selected) return;
  if (selected.state !== "READY_DEPARTURE") return;

  money += 100;
  document.getElementById("money").innerText = money;

  tracks[selected.track - 1] = null;

  selected.state = "DEPARTED";
  selected = null;
}

// 🔁 ADVANCE STATE
function advance(t) {
  if (t.phase === "DISEMBARKING") {
    t.state = "READY_CLEANING";
  }

  if (t.phase === "CLEANING") {
    t.state = "READY_BOARDING";
  }

  if (t.phase === "BOARDING") {
    t.state = "READY_DEPARTURE";
  }

  t.phase = null;
}

// ⏱️ GAME LOOP
setInterval(() => {

  trains.forEach(t => {

    if (t.state === "APPROACHING") {
      assignTrack(t);
    }

    if (t.timer > 0) {
      t.timer--;

      if (t.timer === 0) {
        advance(t);
      }
    }
  });

  updateUI();
  renderQueue();

}, 1000);

// 🎨 UI UPDATE
function updateUI() {

  if (!selected) return;

  document.getElementById("state").innerText = selected.state;
  document.getElementById("track").innerText = selected.track ?? "-";
  document.getElementById("phase").innerText = selected.phase ?? "---";
  document.getElementById("timer").innerText = selected.timer + "s";

  renderActions();
}

// START
renderQueue();

</script>

</body>
</html>
