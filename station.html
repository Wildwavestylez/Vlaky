<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Train Operations - Engine v2 (Clean FSM)</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  font-family: Arial;
}

/* MAP */
#map {
  height: calc(100vh - 55vh);
}

/* UI */
#ui {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 55vh;
  background: #111;
  color: white;
  display: flex;
  flex-direction: column;
  border-top-left-radius: 16px;
  border-top-right-radius: 16px;
  overflow: hidden;
}

/* TOP */
#topbar {
  padding: 6px;
  background: #1c1c1c;
  font-size: 13px;
}

/* LAYOUT */
#content {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* QUEUE */
#queue {
  width: 40%;
  background: #151515;
  overflow-y: auto;
}

.trainItem {
  padding: 8px;
  margin: 6px;
  background: #222;
  border-radius: 8px;
  cursor: pointer;
  font-size: 12px;
}

/* DETAIL */
#detail {
  flex: 1;
  padding: 10px;
}

img {
  width: 100%;
  border-radius: 10px;
}

/* BUTTONS */
button {
  margin: 3px;
  padding: 8px;
  border-radius: 6px;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

.green { background: #4caf50; }
.blue { background: #2196f3; }
.red { background: #f44336; }
.orange { background: #ff9800; }

/* PROGRESS */
.bar {
  height: 8px;
  background: #333;
  border-radius: 6px;
  overflow: hidden;
  margin: 5px 0;
}

.fill {
  height: 100%;
  width: 0%;
  background: limegreen;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="ui">

  <div id="topbar">
    💰 <span id="money">0</span> Kč | 🚉 Plzeň | ENGINE v2
  </div>

  <div id="content">

    <div id="queue"></div>

    <div id="detail">
      <h3 id="name">Vyber vlak</h3>
      <p id="state">---</p>

      <img id="img" />

      <div>
        🧍 Exit
        <div class="bar"><div id="bar_exit" class="fill"></div></div>

        🧹 Clean
        <div class="bar"><div id="bar_clean" class="fill"></div></div>

        🚶 Board
        <div class="bar"><div id="bar_board" class="fill"></div></div>
      </div>

      <button class="green" onclick="startExit()">VYLOŽIT</button>
      <button class="orange" onclick="startClean()">ÚKLID</button>
      <button class="blue" onclick="startBoard()">NÁSTUP</button>
      <button class="red" onclick="depart()">ODJEZD</button>
    </div>

  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// 🌍 MAP
const map = L.map('map').setView([49.7384, 13.3736], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// 💰
let money = 0;
let selected = null;

// 🚂 TRAINS
let trains = [
  {
    id: 1,
    name: "810 → Rokycany",
    image: "https://i.imgur.com/SSg8BRL.jpg",
    state: "ARRIVED",

    phase: null,
    timer: 0,
    activeTimer: null,

    workflow: {
      exit: 20,
      clean: 180,
      board: 20
    },

    progress: {
      exit: 0,
      clean: 0,
      board: 0
    }
  }
];

// 📋 QUEUE
function renderQueue() {
  const q = document.getElementById("queue");
  q.innerHTML = "";

  trains.forEach(t => {
    const div = document.createElement("div");
    div.className = "trainItem";
    div.innerHTML = `<b>${t.name}</b><br><small>${t.state}</small>`;
    div.onclick = () => select(t);
    q.appendChild(div);
  });
}

// 🎯 SELECT
function select(t) {
  selected = t;

  document.getElementById("name").innerText = t.name;
  document.getElementById("state").innerText = t.state;
  document.getElementById("img").src = t.image;

  updateBars();
}

// 📊 BARS
function updateBars() {
  if (!selected) return;

  document.getElementById("bar_exit").style.width = selected.progress.exit + "%";
  document.getElementById("bar_clean").style.width = selected.progress.clean + "%";
  document.getElementById("bar_board").style.width = selected.progress.board + "%";
}

// ⏱ TIMER ENGINE (CLEAN FSM)
function runTimer(train, type, seconds, nextState) {
  if (train.activeTimer) return;

  train.phase = type;
  train.timer = seconds;

  train.activeTimer = setInterval(() => {

    train.timer--;

    let total = train.workflow[type];
    let elapsed = total - train.timer;

    train.progress[type] = (elapsed / total) * 100;

    if (selected && selected.id === train.id) {
      updateBars();
    }

    if (train.timer <= 0) {
      clearInterval(train.activeTimer);
      train.activeTimer = null;

      train.timer = 0;
      train.phase = null;

      // 👉 KLÍČ: žádný auto-chain
      train.state = nextState;
    }

  }, 1000);
}

// 🚶 EXIT
function startExit() {
  if (!selected) return;
  runTimer(selected, "exit", selected.workflow.exit, "WAIT_CLEAN");
}

// 🧹 CLEAN
function startClean() {
  if (!selected) return;
  runTimer(selected, "clean", selected.workflow.clean, "WAIT_BOARD");
}

// 🚶 BOARD
function startBoard() {
  if (!selected) return;
  runTimer(selected, "board", selected.workflow.board, "READY_DEPARTURE");
}

// 🚂 DEPART
function depart() {
  if (!selected) return;
  if (selected.state !== "READY_DEPARTURE") return;

  money += 100;
  document.getElementById("money").innerText = money;

  selected.state = "DEPARTED";
  selected = null;

  renderQueue();
}

// 🔁 LOOP
setInterval(() => {
  renderQueue();
}, 1000);

renderQueue();

</script>

</body>
</html>
