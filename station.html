<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Train Operations - Core</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body {
  margin: 0;
  font-family: Arial;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* MAPA */
#map {
  flex: 1;
}

/* BOTTOM PANEL */
#ui {
  height: 45vh;
  background: #111;
  color: white;
  display: flex;
  flex-direction: column;
  border-top-left-radius: 14px;
  border-top-right-radius: 14px;
  overflow: hidden;
}

/* TOP STATS */
#stats {
  padding: 8px;
  background: #1c1c1c;
  font-size: 14px;
}

/* LAYOUT */
#content {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* QUEUE */
#queue {
  width: 40%;
  background: #151515;
  overflow-y: auto;
  padding: 5px;
  border-right: 1px solid #333;
}

.queueItem {
  padding: 8px;
  margin: 5px;
  background: #222;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
}

.queueItem:hover {
  background: #333;
}

/* DETAIL */
#detail {
  flex: 1;
  padding: 10px;
}

button {
  margin: 3px;
  padding: 8px;
  border: none;
  border-radius: 6px;
  font-weight: bold;
  cursor: pointer;
}

.clean { background: #4caf50; }
.board { background: #2196f3; }
.depart { background: #f44336; }

.bar {
  height: 8px;
  background: #333;
  border-radius: 4px;
  overflow: hidden;
  margin: 5px 0;
}

.fill {
  height: 100%;
  width: 0%;
  background: limegreen;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="ui">

  <div id="stats">
    💰 <span id="money">0</span> Kč | 🚉 Plzeň | Koleje: 2
  </div>

  <div id="content">

    <!-- QUEUE -->
    <div id="queue"></div>

    <!-- DETAIL -->
    <div id="detail">
      <h3 id="tName">Vyber vlak</h3>
      <p id="tState">---</p>
      <p>Track: <span id="tTrack">-</span></p>

      <div>
        🧹 Úklid
        <div class="bar"><div id="cleanBar" class="fill"></div></div>

        🚶 Výstup
        <div class="bar"><div id="exitBar" class="fill"></div></div>

        🚶 Nástup
        <div class="bar"><div id="boardBar" class="fill"></div></div>
      </div>

      <button class="clean" onclick="action('clean')">ÚKLID</button>
      <button class="board" onclick="action('board')">NÁSTUP</button>
      <button class="depart" onclick="depart()">ODJEZD</button>
    </div>

  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// 🌍 MAPA
const map = L.map('map').setView([49.7384, 13.3736], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// 💰 STATE
let money = 0;
let selectedTrain = null;

// 🚉 KOLEJE
const tracks = [null, null];

// 🚂 VLACÍ DATA
let trains = [
  {
    id: 1,
    name: "810 → Rokycany",
    state: "APPROACHING",
    progress: { clean: 0, exit: 0, board: 0 },
    track: null
  },
  {
    id: 2,
    name: "810 → Přeštice",
    state: "APPROACHING",
    progress: { clean: 0, exit: 0, board: 0 },
    track: null
  },
  {
    id: 3,
    name: "Rychlík Praha → Plzeň",
    state: "APPROACHING",
    progress: { clean: 0, exit: 0, board: 0 },
    track: null
  }
];

// 📋 QUEUE RENDER
function renderQueue() {
  const q = document.getElementById("queue");
  q.innerHTML = "";

  trains.forEach(t => {
    const div = document.createElement("div");
    div.className = "queueItem";
    div.innerText = `${t.name} [${t.state}]`;
    div.onclick = () => selectTrain(t);
    q.appendChild(div);
  });
}

// 🎯 SELECT TRAIN
function selectTrain(t) {
  selectedTrain = t;

  document.getElementById("tName").innerText = t.name;
  document.getElementById("tState").innerText = t.state;
  document.getElementById("tTrack").innerText = t.track ?? "-";

  updateBars();
}

// 📊 BARS
function updateBars() {
  if (!selectedTrain) return;

  document.getElementById("cleanBar").style.width = selectedTrain.progress.clean + "%";
  document.getElementById("exitBar").style.width = selectedTrain.progress.exit + "%";
  document.getElementById("boardBar").style.width = selectedTrain.progress.board + "%";
}

// ⚙️ ACTIONS
function action(type) {
  if (!selectedTrain) return;

  selectedTrain.progress[type] += 25;
  if (selectedTrain.progress[type] > 100) selectedTrain.progress[type] = 100;

  updateBars();
}

// 🚉 ASSIGN TRACK
function assignTrack(train) {
  for (let i = 0; i < tracks.length; i++) {
    if (!tracks[i]) {
      tracks[i] = train.id;
      train.track = i + 1;
      train.state = "ARRIVED";
      return;
    }
  }
}

// 🚂 SPAWN LOGIC
function gameLoop() {
  trains.forEach(t => {

    if (t.state === "APPROACHING") {
      assignTrack(t);
    }

    if (t.progress.clean >= 100 && t.progress.exit >= 100 && t.state === "ARRIVED") {
      t.state = "BOARDING";
    }

    if (t.progress.board >= 100 && t.state === "BOARDING") {
      t.state = "READY";
    }
  });

  renderQueue();
  if (selectedTrain) selectTrain(selectedTrain);
}

// 🚂 DEPART
function depart() {
  if (!selectedTrain) return;
  if (selectedTrain.state !== "READY") return;

  money += 100;
  document.getElementById("money").innerText = money;

  tracks[selectedTrain.track - 1] = null;

  selectedTrain.state = "DEPARTED";
  selectedTrain.track = null;

  selectedTrain = null;

  gameLoop();
}

// LOOP
setInterval(gameLoop, 1000);

gameLoop();

</script>

</body>
</html>
